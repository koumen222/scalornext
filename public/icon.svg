<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond vert foncé avec coins arrondis -->
  <rect width="512" height="512" rx="115" fill="#0F6B4F"/>
  
  <!-- Formes géométriques blanches et vertes -->
  <!-- Rectangle blanc haut -->
  <rect x="120" y="60" width="150" height="80" rx="8" fill="white"/>
  
  <!-- Carré vert clair gauche -->
  <rect x="60" y="160" width="100" height="100" rx="8" fill="#7EC8A8"/>
  
  <!-- Rectangle blanc centre -->
  <rect x="180" y="160" width="180" height="100" rx="8" fill="white"/>
  
  <!-- Demi-cercle vert clair bas gauche -->
  <path d="M 60 280 L 60 380 Q 60 380 110 380 Q 160 380 160 330 Q 160 280 110 280 Q 60 280 60 280 Z" fill="#7EC8A8"/>
  
  <!-- Rectangle blanc bas centre -->
  <rect x="180" y="280" width="180" height="80" rx="8" fill="white"/>
  
  <!-- Demi-cercle blanc haut droit -->
  <path d="M 380 100 Q 380 50 430 50 Q 480 50 480 100 L 480 140 L 380 140 Z" fill="white"/>
  
  <!-- Rectangle blanc droit -->
  <rect x="380" y="180" width="120" height="100" rx="8" fill="white"/>
</svg>
